<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration and Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body bgcolor=" pink"> 
        </style>
    <div class="container">
        <div class="form-container sign-up-container">
            <form id="registerForm">
                <h1 align="center">Create Account for Cultural Events </h1>
                <h1 align="center">
                <input type="text" id="name" placeholder="Name" required />
                <br></br>
                </h1>
                <h1 align="center">
                <input type="email" id="email" placeholder="Email" required />
                <br></br>
                </h1>
                <h1 align="center">
                <input type="text" id="contact" placeholder="Contact Details" required />
                <br></br>
                </h1>
                <h1 align="center">
                <input type="file" id="profilePic" accept="image/*" required />
                <br></br>
                </h1>
                <h1 align="center">
                <button type="submit">Register</button>
                <br></br>
               </h1>
        </div>
    </div>
    <body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Directors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🎬 Movie Management</div>
    <div class="nav-links">
        <a th:href="@{/movies}">Movies</a>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/genres}">Genres</a>
        <a th:href="@{/admin/directors}" class="active">Directors</a>
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="two-col">
        <div class="form-card">
            <h2>Add Director</h2>
            <form action="/admin/directors/save" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" name="name" placeholder="Director name" required/>
                </div>
                <div class="form-group">
                    <label>Nationality</label>
                    <input type="text" name="nationality" placeholder="e.g. Indian"/>
                </div>
                <button type="submit" class="btn btn-primary">Add Director</button>
            </form>
        </div>

        <div class="table-wrapper">
            <h2>All Directors</h2>
            <table class="table">
                <thead><tr><th>#</th><th>Name</th><th>Nationality</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="director, stat : ${directors}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${director.name}"></td>
                        <td th:text="${director.nationality ?: '-'}"></td>
                        <td>
                            <a th:href="@{/admin/directors/delete/{id}(id=${director.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Delete director?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

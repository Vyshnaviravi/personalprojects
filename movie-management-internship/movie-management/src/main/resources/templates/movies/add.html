<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Movie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🎬 Movie Management</div>
    <div class="nav-links">
        <a th:href="@{/movies}">Movies</a>
        <a th:href="@{/admin/dashboard}">Admin</a>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <h2>Add New Movie</h2>

        <form action="/movies/save" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title" th:value="${movie.title}" placeholder="Movie title" required/>
                <span class="field-error" th:errors="${movie.title}"></span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Release Year *</label>
                    <input type="number" name="releaseYear" th:value="${movie.releaseYear}" min="1900" max="2100" placeholder="e.g. 2023"/>
                    <span class="field-error" th:errors="${movie.releaseYear}"></span>
                </div>
                <div class="form-group">
                    <label>Rating (0-10) *</label>
                    <input type="number" name="rating" th:value="${movie.rating}" step="0.1" min="0" max="10" placeholder="e.g. 8.5"/>
                    <span class="field-error" th:errors="${movie.rating}"></span>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Genre</label>
                    <select name="genre.id">
                        <option value="">-- Select Genre --</option>
                        <option th:each="genre : ${genres}"
                                th:value="${genre.id}"
                                th:text="${genre.name}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Director</label>
                    <select name="director.id">
                        <option value="">-- Select Director --</option>
                        <option th:each="director : ${directors}"
                                th:value="${director.id}"
                                th:text="${director.name}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Brief description..." th:text="${movie.description}"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Movie</button>
                <a th:href="@{/movies}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>

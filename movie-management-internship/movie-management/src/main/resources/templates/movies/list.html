<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Movies - Movie Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🎬 Movie Management</div>
    <div class="nav-links">
        <a th:href="@{/movies}" class="active">Movies</a>
        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">Admin</a>
        <span class="nav-user">👤 <span sec:authentication="name"></span></span>
        <form action="/logout" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="page-header">
        <h1>All Movies <span class="badge" th:text="${totalMovies}"></span></h1>
        <a th:href="@{/movies/add}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">+ Add Movie</a>
    </div>

    <!-- Search & Filter -->
    <div class="filter-bar">
        <form action="/movies" method="get" class="search-form">
            <input type="text" name="search" placeholder="Search by title..." th:value="${search}"/>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <form action="/movies" method="get" class="filter-form">
            <select name="genreId" onchange="this.form.submit()">
                <option value="">All Genres</option>
                <option th:each="genre : ${genres}"
                        th:value="${genre.id}"
                        th:text="${genre.name}"
                        th:selected="${selectedGenre == genre.id}">
                </option>
            </select>
        </form>
        <a th:href="@{/movies}" class="btn btn-sm">Clear</a>
    </div>

    <!-- Movies Table -->
    <div class="table-wrapper">
        <table class="table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Year</th>
                    <th>Genre</th>
                    <th>Director</th>
                    <th>Rating</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(movies)}">
                    <td colspan="7" class="empty-msg">No movies found.</td>
                </tr>
                <tr th:each="movie, stat : ${movies}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${movie.title}"></td>
                    <td th:text="${movie.releaseYear}"></td>
                    <td th:text="${movie.genre != null ? movie.genre.name : '-'}"></td>
                    <td th:text="${movie.director != null ? movie.director.name : '-'}"></td>
                    <td>
                        <span class="rating-badge" th:text="${movie.rating}"></span>
                    </td>
                    <td class="action-btns">
                        <a th:href="@{/movies/view/{id}(id=${movie.id})}" class="btn btn-sm btn-info">View</a>
                        <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-sm btn-warning" sec:authorize="hasRole('ADMIN')">Edit</a>
                        <a th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-sm btn-danger"
                           sec:authorize="hasRole('ADMIN')"
                           onclick="return confirm('Delete this movie?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
